openapi: "3.1.0"
info:
  title: inspect — Website Security & Accessibility Auditor Tool Reference
  description: |
    inspect is a website security and accessibility auditor.
    It is a Go library with an embeddable MCP server (stdio); the host program
    embeds it directly and ships no standalone binary.

    This document describes the MCP tool surface as a machine-readable reference.
    inspect does NOT expose an HTTP server — all communication is via stdio MCP
    or direct Go library calls.
  version: "0.1.0"
  license:
    name: MIT
    url: https://github.com/GrayCodeAI/inspect/blob/main/LICENSE
  contact:
    url: https://github.com/GrayCodeAI/inspect

# No servers section — inspect has no HTTP API.
# inspect ships no standalone binary. The MCP server is embedded by the host
# program, which constructs it from the library and starts a stdio transport:
#   srv := mcp.New(opts...)  // opts are inspect.Option values
#   srv.ServeStdio()         // stdio transport
# MCP tools are documented below using x-mcp-tool extensions.

tags:
  - name: scan
    description: Website scanning tools
  - name: report
    description: Report generation

x-mcp-server:
  transport: stdio
  package: github.com/GrayCodeAI/inspect/mcp
  constructor: mcp.New(opts...)  # opts are inspect.Option values
  serve_stdio: mcp.Server.ServeStdio()

x-mcp-tools:
  inspect_scan:
    description: Crawl a URL and run website security and accessibility checks
    inputSchema:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: Target URL to scan (must be http:// or https://)
        checks:
          type: array
          items:
            type: string
            enum: [links, security, forms, a11y, perf, seo, sri, aiready, reachability]
          description: Checks to run (default: all)
        depth:
          type: integer
          default: 3
          description: Maximum crawl depth
        concurrency:
          type: integer
          default: 5
          description: Number of concurrent crawlers
        format:
          type: string
          enum: [text, json, sarif, html, markdown, junit]
          default: json
        fail_on:
          type: string
          enum: [info, low, medium, high, critical]
          description: Minimum severity that counts as a failure

  inspect_scan_dir:
    description: Scan a local directory of HTML files
    inputSchema:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Absolute path to the HTML directory
        checks:
          type: array
          items:
            type: string
        format:
          type: string
          enum: [text, json, sarif, html, markdown]
          default: json
