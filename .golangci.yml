version: "2"

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - unused
    - errcheck
    - staticcheck
    - misspell
    - nilerr
    - gosec

linters-settings:
  errcheck:
    check-type-assertions: true
  gosec:
    excludes:
      - G204
      - G107  # HTTP request with variable URL (expected for a crawler)
  misspell:
    locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
