<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspect Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .header {
      background: #1a1a1a;
      padding: 1rem 2rem;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 1.5rem;
      color: #00d4ff;
    }
    .connection-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
    }
    .status-dot.connected { background: #00ff88; }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #1a1a1a;
      padding: 1.5rem;
      border-radius: 8px;
      border: 1px solid #333;
    }
    .stat-card h3 {
      font-size: 0.875rem;
      color: #888;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
    }
    .tests-section {
      background: #1a1a1a;
      border-radius: 8px;
      border: 1px solid #333;
      overflow: hidden;
    }
    .tests-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tests-header h2 {
      font-size: 1rem;
      font-weight: 600;
    }
    .test-list {
      max-height: 500px;
      overflow-y: auto;
    }
    .test-item {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #333;
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 1rem;
      align-items: center;
    }
    .test-item:last-child { border-bottom: none; }
    .test-item:hover { background: #222; }
    .test-name {
      font-weight: 500;
      color: #fff;
    }
    .test-url {
      font-size: 0.75rem;
      color: #666;
      margin-top: 0.25rem;
    }
    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-badge.running { background: #0066ff33; color: #00aaff; }
    .status-badge.completed { background: #00ff8833; color: #00ff88; }
    .status-badge.failed { background: #ff444433; color: #ff4444; }
    .duration {
      font-size: 0.875rem;
      color: #888;
      font-variant-numeric: tabular-nums;
    }
    .steps-count {
      font-size: 0.75rem;
      color: #666;
    }
    .log-section {
      margin-top: 2rem;
      background: #1a1a1a;
      border-radius: 8px;
      border: 1px solid #333;
      overflow: hidden;
    }
    .log-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #333;
      font-weight: 600;
    }
    .log-container {
      max-height: 300px;
      overflow-y: auto;
      padding: 1rem;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 0.75rem;
    }
    .log-entry {
      padding: 0.5rem 0;
      border-bottom: 1px solid #222;
      display: flex;
      gap: 1rem;
    }
    .log-time { color: #666; }
    .log-type-test-started { color: #00aaff; }
    .log-type-test-completed { color: #00ff88; }
    .log-type-step-started { color: #ffaa00; }
    .log-type-step-completed { color: #888; }
    .log-type-error { color: #ff4444; }
    .empty-state {
      text-align: center;
      padding: 4rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Inspect Dashboard</h1>
    <div class="connection-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </div>

  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Active Tests</h3>
        <div class="stat-value" id="activeTests">0</div>
      </div>
      <div class="stat-card">
        <h3>Completed</h3>
        <div class="stat-value" id="completedTests">0</div>
      </div>
      <div class="stat-card">
        <h3>Failed</h3>
        <div class="stat-value" id="failedTests">0</div>
      </div>
      <div class="stat-card">
        <h3>Cache Hit Rate</h3>
        <div class="stat-value" id="cacheHitRate">-</div>
      </div>
    </div>

    <div class="tests-section">
      <div class="tests-header">
        <h2>Test Executions</h2>
        <button onclick="refreshHistory()">Refresh</button>
      </div>
      <div class="test-list" id="testList">
        <div class="empty-state">No tests yet. Start a test to see it here.</div>
      </div>
    </div>

    <div class="log-section">
      <div class="log-header">Live Logs</div>
      <div class="log-container" id="logContainer"></div>
    </div>
  </div>

  <script>
    const wsUrl = 'ws://localhost:3001';
    let ws = null;
    let tests = new Map();
    let logs = [];

    function connect() {
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        console.log('Connected to dashboard');
        updateStatus(true);
        ws.send(JSON.stringify({ type: 'get:history' }));
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleMessage(msg);
      };

      ws.onclose = () => {
        console.log('Disconnected from dashboard');
        updateStatus(false);
        setTimeout(connect, 5000);
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
      };
    }

    function updateStatus(connected) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (connected) {
        dot.classList.add('connected');
        text.textContent = 'Connected';
      } else {
        dot.classList.remove('connected');
        text.textContent = 'Disconnected';
      }
    }

    function handleMessage(msg) {
      addLog(msg);

      switch (msg.type) {
        case 'connected':
          console.log('Dashboard client ID:', msg.clientId);
          break;
        case 'history:response':
          tests.clear();
          msg.tests?.forEach(test => tests.set(test.sessionId, test));
          renderTests();
          break;
        case 'test:started':
          tests.set(msg.sessionId, {
            id: msg.testId,
            name: msg.testName,
            url: msg.url,
            status: 'running',
            startTime: msg.startTime,
            steps: [],
            sessionId: msg.sessionId
          });
          renderTests();
          break;
        case 'test:completed':
          const test = tests.get(msg.sessionId);
          if (test) {
            test.status = msg.success ? 'completed' : 'failed';
            test.endTime = Date.now();
            test.duration = msg.duration;
          }
          renderTests();
          break;
        case 'test:state':
          tests.set(msg.test.sessionId, msg.test);
          renderTests();
          break;
      }

      updateStats();
    }

    function addLog(msg) {
      const time = new Date(msg.timestamp || Date.now()).toLocaleTimeString();
      logs.unshift({ time, type: msg.type, msg });
      if (logs.length > 100) logs.pop();
      renderLogs();
    }

    function renderLogs() {
      const container = document.getElementById('logContainer');
      container.innerHTML = logs.map(log => `
        <div class="log-entry">
          <span class="log-time">${log.time}</span>
          <span class="log-type-${log.type.replace(/:/g, '-')}">${log.type}</span>
          <span>${getLogSummary(log.msg)}</span>
        </div>
      `).join('');
    }

    function getLogSummary(msg) {
      switch (msg.type) {
        case 'test:started': return msg.testName;
        case 'test:completed': return `${msg.testName} - ${msg.success ? 'success' : 'failed'}`;
        case 'step:started': return `Step ${msg.stepNumber}: ${msg.instruction.slice(0, 50)}...`;
        case 'step:completed': return `Step completed - ${msg.success ? 'success' : 'failed'}`;
        default: return '';
      }
    }

    function renderTests() {
      const container = document.getElementById('testList');
      const testArray = Array.from(tests.values()).sort((a, b) => b.startTime - a.startTime);

      if (testArray.length === 0) {
        container.innerHTML = '<div class="empty-state">No tests yet. Start a test to see it here.</div>';
        return;
      }

      container.innerHTML = testArray.map(test => `
        <div class="test-item">
          <div>
            <div class="test-name">${test.name}</div>
            <div class="test-url">${test.url}</div>
          </div>
          <span class="status-badge ${test.status}">${test.status}</span>
          <span class="duration">${formatDuration(test.duration)}</span>
          <span class="steps-count">${test.steps?.length || 0} steps</span>
        </div>
      `).join('');
    }

    function updateStats() {
      const testArray = Array.from(tests.values());
      document.getElementById('activeTests').textContent = testArray.filter(t => t.status === 'running').length;
      document.getElementById('completedTests').textContent = testArray.filter(t => t.status === 'completed').length;
      document.getElementById('failedTests').textContent = testArray.filter(t => t.status === 'failed').length;
    }

    function formatDuration(ms) {
      if (!ms) return '-';
      if (ms < 1000) return `${ms}ms`;
      return `${(ms / 1000).toFixed(1)}s`;
    }

    function refreshHistory() {
      if (ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'get:history' }));
      }
    }

    connect();
  </script>
</body>
</html>
