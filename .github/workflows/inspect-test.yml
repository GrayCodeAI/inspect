name: Inspect Browser Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      url:
        description: "URL to test"
        required: false
        default: ""
      instruction:
        description: "Test instruction"
        required: false
        default: "Test the main user flows"

# Cancel in-progress runs for the same PR
concurrency:
  group: inspect-test-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  inspect-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run unit tests
        run: npx vitest run --reporter=verbose

      - name: Run Inspect doctor
        run: node apps/cli/dist/index.js doctor
        continue-on-error: true

      - name: Verify CLI commands
        run: |
          node apps/cli/dist/index.js --help
          node apps/cli/dist/index.js doctor --json

      # Generate test report as GitHub Actions annotations
      - name: Generate test summary
        if: always()
        run: |
          echo "## Inspect Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | $(node --version) |" >> $GITHUB_STEP_SUMMARY
          echo "| pnpm | $(pnpm --version) |" >> $GITHUB_STEP_SUMMARY
          echo "| Packages | 17 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Generated by [Inspect](https://github.com/inspect)*" >> $GITHUB_STEP_SUMMARY

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspect-results
          path: |
            .inspect/recordings/
            .inspect/screenshots/
            .inspect/reports/
          retention-days: 7
        continue-on-error: true

